  - id: emission_reduction_planning
    name: Emission Reduction Planning Optimizer
    display_name: Emission Reduction Planning
    short_description: Select emission reduction projects to meet a CO2 target at minimum total investment cost.
    description: >
      Choose from a portfolio of emission reduction initiatives (energy efficiency,
      renewable installations, process changes) to meet a corporate or regulatory CO2
      reduction target at minimum total cost. Each initiative has an implementation cost,
      an annual CO2 reduction, and optional dependencies. The solver picks the cheapest
      combination that achieves the target. Useful for corporate sustainability planning
      and government climate policy.
    scenario_description: >
      A manufacturing company must reduce annual CO2 emissions by 500 tonnes to meet
      new regulations. Eight candidate projects range from LED lighting (EUR 5k, 30t
      reduction) to a solar installation (EUR 80k, 200t reduction). The sustainability
      officer wants the cheapest plan that hits the target.
    category: environmental
    tags: [environmental, emissions, carbon, sustainability, climate]
    problem_type_tags: [MIP]
    generator_type: knapsack
    generator_params: {}
    input_schema:
      type: object
      required: [capacity, items]
      properties:
        capacity: {type: number}
        items: {type: array}
    input_fields:
      - name: capacity
        label: Budget
        type: number
        description: Total available investment budget
        required: true
        minimum: 1
        default: 200000
      - name: items
        label: Reduction Projects
        type: array
        description: Projects with CO2 reduction value and implementation cost
        required: true
        items:
          type: object
          properties:
            name: {type: string}
            value: {type: number}
            weight: {type: number}
    example_input:
      capacity: 200000
      items:
        - {name: led_lighting, value: 30, weight: 5000}
        - {name: hvac_upgrade, value: 80, weight: 25000}
        - {name: solar_panels, value: 200, weight: 80000}
        - {name: insulation, value: 50, weight: 15000}
        - {name: electric_fleet, value: 120, weight: 60000}
        - {name: heat_recovery, value: 70, weight: 20000}
        - {name: process_optimization, value: 40, weight: 10000}
        - {name: green_hydrogen, value: 150, weight: 90000}
    is_featured: false
    estimated_variables: 8
    estimated_constraints: 1
