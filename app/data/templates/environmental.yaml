category: environmental
category_display_name: Environmental & Sustainability

templates:
  - id: waste_collection_routing
    name: Waste Collection Routing Optimizer
    display_name: Waste Collection Routing
    short_description: Plan garbage truck routes to collect waste from all sites at minimum total distance and fuel cost.
    description: >
      Design collection routes for a fleet of waste trucks that must visit all pickup
      sites and return to the depot. Each truck has a weight capacity and each site has
      a known waste volume. The solver minimizes total distance (and therefore fuel cost
      and emissions) while ensuring every site is serviced. This is a specialized VRP
      variant for municipal waste management and recycling logistics.
    scenario_description: >
      A city's waste department operates 3 trucks (capacity 8 tonnes each) from a central
      depot. Fifteen neighbourhood pickup points generate 0.5 to 2.0 tonnes per
      collection day. The route planner wants to minimise total kilometres driven while
      visiting every point.
    category: environmental
    tags: [environmental, waste, routing, collection, municipal]
    problem_type_tags: [MIP]
    generator_type: routing
    generator_params: {}
    input_schema:
      type: object
      required: [depot, locations, vehicles, distances]
      properties:
        depot: {type: object}
        locations: {type: array}
        vehicles: {type: array}
        distances: {type: object}
    input_fields:
      - name: depot
        label: Depot
        type: object
        description: Waste depot / transfer station
        required: true
      - name: locations
        label: Pickup Sites
        type: array
        description: Collection points with waste volume (tonnes)
        required: true
        items:
          type: object
          properties:
            name: {type: string}
            demand: {type: number}
      - name: vehicles
        label: Trucks
        type: array
        description: Waste trucks with capacity
        required: true
        items:
          type: object
          properties:
            name: {type: string}
            capacity: {type: number}
            cost_per_unit_distance: {type: number}
      - name: distances
        label: Distance Matrix
        type: object
        description: "Distances between all points as {from_to: km}"
        required: true
    example_input:
      depot: {name: depot}
      locations:
        - {name: site_1, demand: 1.5}
        - {name: site_2, demand: 2.0}
        - {name: site_3, demand: 0.8}
        - {name: site_4, demand: 1.2}
        - {name: site_5, demand: 1.8}
        - {name: site_6, demand: 0.5}
      vehicles:
        - {name: truck_1, capacity: 5, cost_per_unit_distance: 1.5}
        - {name: truck_2, capacity: 5, cost_per_unit_distance: 1.5}
      distances:
        depot_site_1: 5
        depot_site_2: 8
        depot_site_3: 12
        depot_site_4: 10
        depot_site_5: 6
        depot_site_6: 15
        site_1_depot: 5
        site_2_depot: 8
        site_3_depot: 12
        site_4_depot: 10
        site_5_depot: 6
        site_6_depot: 15
        site_1_site_2: 4
        site_1_site_3: 9
        site_1_site_4: 7
        site_1_site_5: 3
        site_1_site_6: 11
        site_2_site_1: 4
        site_2_site_3: 6
        site_2_site_4: 5
        site_2_site_5: 7
        site_2_site_6: 8
        site_3_site_1: 9
        site_3_site_2: 6
        site_3_site_4: 3
        site_3_site_5: 10
        site_3_site_6: 4
        site_4_site_1: 7
        site_4_site_2: 5
        site_4_site_3: 3
        site_4_site_5: 8
        site_4_site_6: 6
