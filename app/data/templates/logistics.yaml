        food_zone_E: 28
        food_zone_F: 34
        furniture_zone_A: 20
        furniture_zone_B: 15
        furniture_zone_C: 10
        furniture_zone_D: 8
        furniture_zone_E: 12
        furniture_zone_F: 18
        books_zone_A: 10
