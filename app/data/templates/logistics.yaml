  - id: fleet_sizing
    name: Fleet Sizing Optimizer
    display_name: Fleet Sizing
    short_description: Determine the optimal number and type of vehicles to operate for a set of delivery routes and demand levels.
    description: >
      Decide how many vehicles of each type (small van, medium truck, large truck) to
      deploy to cover a set of demand segments at minimum total cost. Each vehicle type
      has a capacity, a fixed daily cost, and a variable cost per unit delivered. The
      solver ensures total fleet capacity meets demand while minimizing the sum of fixed
      and variable costs. The result tells you the fleet mix and which segments each
      vehicle type covers.
    scenario_description: >
      A courier company serves 5 city zones with daily parcel volumes of 50-300 parcels.
      Three vehicle types are available: bikes (20 parcels, EUR 30/day), vans (80 parcels,
      EUR 90/day), and trucks (200 parcels, EUR 180/day). The logistics manager wants the
      cheapest fleet that handles peak demand.
    category: logistics
    tags: [logistics, fleet, capacity-planning, vehicles]
    problem_type_tags: [MIP]
    generator_type: fleet_sizing
    generator_params: {}
    input_schema:
      type: object
      required: [vehicle_types, total_demand]
      properties:
        vehicle_types: {type: array}
        total_demand: {type: number}
        min_vehicles_by_type: {type: object}
    input_fields:
      - name: vehicle_types
        label: Vehicle Types
        type: array
        description: Available vehicle types with capacity and cost
        required: true
        items:
          type: object
          properties:
            name: {type: string}
            capacity_parcels: {type: number}
            daily_fixed_cost: {type: number}
            max_available: {type: integer}
      - name: total_demand
        label: Total Daily Demand
        type: number
        description: Total parcels/units to deliver per day
        required: true
      - name: min_vehicles_by_type
        label: Minimum Vehicles
        type: object
        description: "Minimum count per type, e.g. {Truck: 1}"
        required: false
    example_input:
      vehicle_types:
        - {name: Bike, capacity_parcels: 20, daily_fixed_cost: 30, max_available: 30}
        - {name: Van, capacity_parcels: 80, daily_fixed_cost: 90, max_available: 15}
        - {name: Truck, capacity_parcels: 200, daily_fixed_cost: 180, max_available: 8}
      total_demand: 850
      min_vehicles_by_type:
        Truck: 1
    is_featured: false
    estimated_variables: 3
    estimated_constraints: 1
