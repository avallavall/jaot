# Blackbox exporter configuration for TLS certificate and HTTP availability monitoring

modules:
  tls_connect:
    prober: tcp
    timeout: 5s
    tcp:
      tls: true

  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4
      tls_config:
        insecure_skip_verify: false
