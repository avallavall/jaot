global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "jaot-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8001"]
        labels:
          service: "jaot-api"

  - job_name: "node-exporter"
    scrape_interval: 30s
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "node-exporter"

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: "cadvisor"

  - job_name: "postgres"
    scrape_interval: 30s
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgres"

  - job_name: "redis"
    scrape_interval: 30s
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"

  - job_name: "rabbitmq"
    scrape_interval: 30s
    static_configs:
      - targets: ["rabbitmq:15692"]
        labels:
          service: "rabbitmq"

  - job_name: "celery"
    static_configs:
      - targets: ["celery-exporter:9808"]
        labels:
          service: "celery"

  - job_name: "qdrant"
    scrape_interval: 30s
    metrics_path: "/metrics"
    # Qdrant enforces API-key auth (the app passes QDRANT_API_KEY); without it the scrape gets 401.
    # Prometheus ≥3.0 http_headers + a bind-mounted secret file keep the key out of this config.
    http_headers:
      api-key:
        files: ["/etc/prometheus/secrets/qdrant_api_key"]
    static_configs:
      - targets: ["qdrant:6333"]
        labels:
          service: "qdrant"

  - job_name: "blackbox-tls"
    scrape_interval: 5m
    metrics_path: /probe
    params:
      module: [tls_connect]
    static_configs:
      - targets:
          - jaot.io:443
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: "blackbox-http"
    scrape_interval: 5m
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://jaot.io/api/v2/health/status
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
