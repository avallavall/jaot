# Redis production configuration
# Allocated ~256MB to Redis
# Source: Redis official documentation

# Authentication (password injected via REDIS_PASSWORD env var in compose)
# requirepass is set via command-line flag in deploy/docker-compose.prod.yml

# Memory — leave headroom for RDB fork (container limit is 384M)
maxmemory 256mb
maxmemory-policy allkeys-lru

# RDB persistence (no AOF -- acceptable data loss: rate limit counters, Celery results in transit)
save 300 1
save 60 100

# Network -- bind to all interfaces within Docker network, auth handles security
bind 0.0.0.0
protected-mode yes

# Disable destructive commands — defense in depth against injection or lateral movement
# CONFIG and KEYS are NOT renamed: redis-exporter needs CONFIG GET, Celery uses CONFIG at startup
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""

# General
daemonize no
loglevel notice
