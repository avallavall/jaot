# PostgreSQL production tuning
# Allocated ~1.5GB RAM to PostgreSQL
# Source: PostgreSQL documentation + PGTune recommendations

# Connection settings
max_connections = 100
listen_addresses = '*'

# Memory settings (25% of allocated PG memory)
shared_buffers = 384MB
work_mem = 4MB
effective_cache_size = 1GB
maintenance_work_mem = 64MB

# WAL settings
wal_level = replica
wal_buffers = 16MB
checkpoint_completion_target = 0.9
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
archive_timeout = 300

# Logging (UTC, DDL + slow queries for security audit trail)
log_timezone = 'UTC'
log_statement = 'ddl'
log_min_duration_statement = 1000
log_connections = on
log_disconnections = on
