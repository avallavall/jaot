# RabbitMQ production configuration
# Allocated 512MB container, 256MiB watermark
# Source: rabbitmq.com/docs/memory

# CRITICAL: Use absolute watermark in containers, NOT relative
# RabbitMQ may detect total host memory instead of the container limit (512MB)
# Relative watermark 0.5 would be half the host's RAM, never triggering flow control
vm_memory_high_watermark.absolute = 256MiB

# Credentials managed exclusively via RABBITMQ_DEFAULT_USER/PASS env vars in compose
# Do NOT hardcode credentials in this committed file

# Logging
log.console = true
log.console.level = warning

# Prometheus metrics endpoint on :15692
# Scraped by Prometheus via Docker network (not exposed to host)
# Per-object metrics disabled to prevent cardinality explosion
prometheus.return_per_object_metrics = false
