name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case, not just the solution you have in mind.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How do you imagine it working? Alternatives you considered are welcome.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Solvers / optimization engine
        - Templates / problem generators
        - LLM assistant
        - Marketplace
        - API / MCP server
        - Frontend / UX
        - Deployment / operations
        - Other
    validations:
      required: false
