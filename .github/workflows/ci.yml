# Public CI — lint + tests on every PR and push to main.
#
# This is the contributor-facing pipeline: it runs on a plain GitHub runner
# with no secrets. Deploys are handled separately by the maintainer's
# self-hosted deploy workflow (.github/workflows/deploy.yml).

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install "ruff>=0.14.0"
      - run: ruff check app/
      - run: ruff format --check app/

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: jaot
          POSTGRES_PASSWORD: jaot
          POSTGRES_DB: jaot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jaot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: "postgresql://jaot:jaot@localhost:5432/jaot_test"
      TEST_DATABASE_URL: "postgresql://jaot:jaot@localhost:5432/jaot_test"
      REDIS_URL: ""
      CELERY_BROKER_URL: ""
      DEBUG: "True"
      JWT_SECRET: "ci-test-secret-not-for-production-use"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install uv
      - run: uv pip install --system -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: >-
          pytest tests/
          -p no:xdist
          --cov=app
          --cov-fail-under=78
          --cov-report=term-missing
          --tb=short

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline
      - run: npm run lint
      - run: npm run check-i18n

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline
      - run: npm run test
